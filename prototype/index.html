<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qqCMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { background: var(--bg0); color: var(--text0); font-family: 'Geist Mono', monospace; font-size: 12px; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
    input, textarea, select, button { font-family: 'Geist Mono', monospace; }

    /* ── Dark theme (default) ── */
    :root {
      --bg0: #090909; --bg1: #0f0f0f; --bg2: #171717; --bg3: #1f1f1f; --bg4: #272727;
      --border: #2a2a2a; --border-hover: #3a3a3a;
      --text0: #e0e0e0; --text1: #777; --text2: #3f3f3f;
      --accent: #6B5CE7;
      --accent-hover: #7b6cf0;
      --accent-faint: rgba(107,92,231,0.12);
      --accent-dark: #1E1B3A;
      --green: #2ECC71; --green-faint: rgba(46,204,113,0.12);
      --amber: #F5A623; --amber-faint: rgba(245,166,35,0.12);
      --coral: #F06B6B; --coral-faint: rgba(240,107,107,0.12);
    }
    /* ── Light theme ── */
    :root.light {
      --bg0: #f7f7f7; --bg1: #f0f0f0; --bg2: #e9e9e9; --bg3: #e0e0e0; --bg4: #d4d4d4;
      --border: #cccccc; --border-hover: #aaaaaa;
      --text0: #111111; --text1: #555555; --text2: #999999;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
