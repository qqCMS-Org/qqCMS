services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    volumes:
      # PGLite file lives at ./data/qqcms.db relative to /app/apps/api
      - pglite_data:/app/apps/api/data
    networks:
      - dokploy-network

  admin:
    build:
      context: .
      target: admin
    restart: unless-stopped
    networks:
      - dokploy-network

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  pglite_data:
