services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qqcms
      POSTGRES_PASSWORD: qqcms
      POSTGRES_DB: qqcms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    networks:
      - dokploy-network

  admin:
    build:
      context: .
      target: admin
    restart: unless-stopped
    networks:
      - dokploy-network

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
