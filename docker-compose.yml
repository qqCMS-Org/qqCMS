services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      - ADMIN_LOGIN
      - ADMIN_PASSWORD_HASH
      - JWT_SECRET
      - CORS_ORIGINS
      - DEBUG
      - DATABASE_URL
      - UPLOAD_DIR
      - PUBLIC_CLIENT_URL
      - RUN_MIGRATIONS_ON_STARTUP
      - PORT
    volumes:
      # PGLite file lives at ./data/qqcms.db relative to /app/apps/api inside the container
      - pglite_data:/app/apps/api/data
    networks:
      - dokploy-network

  admin:
    build:
      context: .
      target: admin
    restart: unless-stopped
    networks:
      - dokploy-network

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - REVALIDATE_SECRET
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  pglite_data:
