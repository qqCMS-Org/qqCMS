services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "3000:3000"

  admin:
    build:
      context: .
      target: admin
    restart: unless-stopped
    ports:
      - "3001:80"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
